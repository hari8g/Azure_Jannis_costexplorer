name: Azure FinOps CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Build
        run: ./build.sh
      - name: Run tests
        run: ./tests/run-tests.sh
