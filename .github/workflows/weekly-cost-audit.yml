name: Weekly Azure Cost Audit

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  weekly-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build
        run: ./build.sh
      - name: Placeholder weekly execution
        run: |
          echo "Configure Azure credentials and run:"
          echo "./live-audit.sh --subscription <sub-id> --all"
